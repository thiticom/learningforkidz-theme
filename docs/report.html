<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learning For Kidz Latest Report</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #5e687a;
      --line: #dde4ec;
      --panel: #fff;
      --surface: #f7f9fb;
      --cyan: #42bedd;
      --blue: #2f6f9f;
      --orange: #c96f45;
      --green: #1e6a3d;
      --gold: #87521c;
      --red: #b54747;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--surface);
      font-family: "Noto Sans Thai", Tahoma, "Segoe UI", Arial, sans-serif;
      line-height: 1.65;
    }
    a { color: var(--blue); }
    img { display: block; max-width: 100%; }
    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 68px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--orange);
      font-size: .92rem;
      font-weight: 800;
    }
    h1 {
      margin: 0;
      max-width: 1040px;
      font-size: clamp(2.15rem, 5vw, 4rem);
      line-height: 1.08;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.25;
      letter-spacing: 0;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 1.08rem;
      line-height: 1.35;
      letter-spacing: 0;
    }
    p { margin: 0 0 12px; }
    .lead {
      margin-top: 16px;
      max-width: 920px;
      color: var(--muted);
      font-size: 1.08rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }
    .button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
    }
    .button.primary {
      border-color: var(--cyan);
      background: var(--cyan);
      color: #082330;
    }
    section { margin-top: 34px; }
    .summary, .callout, .card, details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .summary, .callout { padding: 18px; }
    .summary ul, .callout ul { margin: 0; padding-left: 22px; }
    li + li { margin-top: 7px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .metric {
      min-height: 142px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .metric-value {
      color: var(--blue);
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 1;
      font-weight: 900;
    }
    .metric-label {
      margin-top: 8px;
      font-weight: 900;
    }
    .metric p, .muted { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .card { padding: 16px; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }
    th, td {
      padding: 11px 13px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
    }
    tr:last-child th, tr:last-child td { border-bottom: 0; }
    th { font-weight: 900; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 29px;
      white-space: nowrap;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .82rem;
      font-weight: 900;
    }
    .badge.pass { background: #e6f6ed; color: var(--green); }
    .badge.note { background: #fff2dc; color: var(--gold); }
    .badge.fix { background: #fdeaea; color: var(--red); }
    details { padding: 14px; }
    details + details { margin-top: 12px; }
    summary {
      cursor: pointer;
      font-weight: 900;
    }
    .shots {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }
    figure img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      object-position: top;
      border-bottom: 1px solid var(--line);
    }
    figcaption {
      padding: 9px 11px;
      color: var(--muted);
      font-size: .9rem;
    }
    @media (max-width: 900px) {
      .metrics, .grid, .shots { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 620px) {
      .metrics, .grid, .shots { grid-template-columns: 1fr; }
      .button { width: 100%; justify-content: center; }
      figure img { height: 240px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="eyebrow">Latest Report - 2026-06-18</p>
    <h1>Latest Report</h1><p class="lead">รายงานล่าสุดย้ายมาอยู่หน้า overview.</p><div class="actions"><a class="button primary" href="./">เปิด Team Overview</a></div>
  </main>
</body>
</html>
