name: ${COMPOSE_PROJECT_NAME:-learningforkidz}

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-learningforkidz}
      MARIADB_USER: ${WORDPRESS_DB_USER:-learningforkidz}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-learningforkidz_dev_password}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-learningforkidz_root_password}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_BIND:-127.0.0.1}:${WORDPRESS_PORT:-8085}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-learningforkidz}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-learningforkidz}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-learningforkidz_dev_password}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
        define( 'WP_DEBUG', true );
        define( 'WP_DEBUG_DISPLAY', false );
    volumes:
      - wordpress_data:/var/www/html
      - ./themes/lfk-tailwind:/var/www/html/wp-content/themes/lfk-tailwind
      - ./plugins/lfk-resource-downloads:/var/www/html/wp-content/plugins/lfk-resource-downloads

  cli:
    image: wordpress:cli-php8.2
    user: "33:33"
    depends_on:
      - db
      - wordpress
    environment:
      HOME: /tmp
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-learningforkidz}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-learningforkidz}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-learningforkidz_dev_password}
    volumes:
      - wordpress_data:/var/www/html
      - ./themes/lfk-tailwind:/var/www/html/wp-content/themes/lfk-tailwind
      - ./plugins/lfk-resource-downloads:/var/www/html/wp-content/plugins/lfk-resource-downloads

volumes:
  db_data:
  wordpress_data:
